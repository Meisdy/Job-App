<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Radar - My Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --surface3: #222222;
      --text: #f0f0f0;
      --text2: #c0c0c0;
      --text3: #888888;
      --border: #2a2a2a;
      --border2: #333333;
      --accent: #60a5fa;
      --accent-dim: rgba(96, 165, 250, 0.1);
      --green: #34d399;
      --green-dim: rgba(52, 211, 153, 0.1);
      --yellow: #fbbf24;
      --yellow-dim: rgba(251, 191, 36, 0.1);
      --red: #f87171;
      --red-dim: rgba(248, 113, 113, 0.1);
    }
    
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      -webkit-font-smoothing: antialiased; 
    }
    
    html {
      overflow-y: scroll;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 40px 20px;
      line-height: 1.6;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    
    h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
    }
    
    .btn {
      padding: 10px 20px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      color: var(--text2);
    }
    
    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    
    .btn-primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    
    .btn-primary:hover {
      opacity: 0.9;
    }
    
    .section {
      margin-bottom: 24px;
    }
    
    .section-title {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text3);
      margin-bottom: 12px;
      display: block;
    }
    
    .content {
      font-size: 15px;
      color: var(--text2);
      white-space: pre-wrap;
    }
    
    .empty {
      text-align: center;
      padding: 60px 20px;
    }
    
    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    
    .empty-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .empty-text {
      color: var(--text3);
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card" id="profile-card">
      <div class="loading">Loading profile...</div>
    </div>
  </div>

  <script>
    const PROFILE_URL = '/api/profile';

    async function loadProfile() {
      const card = document.getElementById('profile-card');
      
      try {
        const content = await fetch(PROFILE_URL).then(r => r.text());
        
        if (!content.trim()) {
          card.innerHTML = `
            <div class="empty">
              <div class="empty-icon">👤</div>
              <div class="empty-title">No Profile Found</div>
              <div class="empty-text">Complete onboarding to create your profile and get personalized job fit assessments.</div>
              <a href="/onboarding.html" class="btn btn-primary">Start Onboarding →</a>
            </div>
          `;
          return;
        }
        
        card.innerHTML = `
          <div class="header">
            <h1>My Profile</h1>
            <div style="display:flex;align-items:center;gap:12px">
              <span style="font-size:11px;color:var(--text3)">Edit <code style="background:var(--surface2);padding:1px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:10px">config/user_profile.md</code> directly or</span>
              <a href="/onboarding.html?redo=true" class="btn">🔄 Re-do Onboarding</a>
            </div>
          </div>
          
          <div class="section">
            <div class="section-title">Profile Markdown</div>
            <pre class="content">${escapeHtml(content)}</pre>
          </div>
        `;
      } catch (err) {
        card.innerHTML = `
          <div class="error">
            <div>Failed to load profile</div>
            <div style="font-size: 12px; margin-top: 8px;">${err.message}</div>
          </div>
        `;
      }
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadProfile().catch(err => {
      console.error('Profile loading error:', err);
    });
  </script>
</body>
</html>
