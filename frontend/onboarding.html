<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Master - Onboarding</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <style>
    * { box-sizing: border-box; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 20px;
    }
    .onboarding-container {
      width: 100%;
      max-width: 800px;
      padding: 40px;
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    .progress-bar {
      height: 6px;
      background: var(--border2);
      border-radius: 3px;
      margin-bottom: 40px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.3s ease;
    }
    .question-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text);
      line-height: 1.3;
    }
    .question-subtitle {
      font-size: 15px;
      color: var(--text2);
      margin-bottom: 24px;
      line-height: 1.6;
    }
    textarea {
      width: 100%;
      min-height: 200px;
      padding: 16px;
      border: 1px solid var(--border2);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      resize: vertical;
      font-family: inherit;
    }
    textarea::placeholder { color: var(--text3); opacity: 0.6; }
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim);
    }
    .button-row {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      justify-content: flex-end;
    }
    button {
      padding: 12px 24px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #4a9af0; transform: translateY(-1px); }
    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border2);
    }
    .btn-secondary:hover {
      background: var(--surface3);
      border-color: var(--border);
    }
    .complete-screen {
      text-align: center;
      display: none;
      padding: 40px 20px;
    }
    .complete-screen h2 {
      font-size: 32px;
      margin-bottom: 16px;
      color: var(--green);
    }
    .complete-screen p {
      color: var(--text2);
      margin-bottom: 32px;
      font-size: 16px;
      line-height: 1.6;
    }
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--border2);
      border-top: 4px solid var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .question-counter {
      display: inline-block;
      padding: 4px 12px;
      background: var(--accent-dim);
      color: var(--accent);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="onboarding-container">
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
    </div>
    
    <div id="question-container">
      <div class="question-counter" id="question-counter">Question 1 of 10</div>
      <h1 class="question-title" id="question-title">Loading...</h1>
      <p class="question-subtitle" id="question-subtitle"></p>
      <textarea id="answer-input" placeholder="Type your answer here..."></textarea>
      <div class="button-row">
        <button class="btn-secondary" id="prev-btn" onclick="prevQuestion()" style="display:none">Previous</button>
        <button class="btn-primary" id="next-btn" onclick="nextQuestion()">Next</button>
      </div>
    </div>
    
    <div class="complete-screen" id="complete-screen">
      <h2>✅ Profile Complete!</h2>
      <p>Your profile has been generated. Check /config/user_profile.md to view or edit.</p>
      <button class="btn-primary" onclick="goToDashboard()">Go to Dashboard</button>
    </div>
    
    <div class="complete-screen" id="loading-screen" style="display: none;">
      <div class="loading-spinner"></div>
      <h2>Generating Profile...</h2>
      <p>Analyzing your answers and creating your comprehensive profile...</p>
      <p style="font-size: 14px; color: var(--text3);">This may take a moment as we build your personalized narrative.</p>
    </div>
  </div>

    <script>
    const questions = [
      {
        title: "CV Drop",
        subtitle: "Paste your full CV or key stations: title, company/institution, period, core tasks."
      },
      {
        title: "Career Goal (3–5 Years)",
        subtitle: "Role, industry, country, seniority — as specific as possible. Not 'interesting work', but what exactly."
      },
      {
        title: "Intrinsic Motivation",
        subtitle: "What gives you energy at work? (e.g. hands-on building, debugging deep systems, deploying things, autonomy, impact) — no generic answers."
      },
      {
        title: "No-Gos",
        subtitle: "Absolute dealbreakers: culture, task types, travel %, hierarchy, corporate language, management style, industries."
      },
      {
        title: "Tech Skills: Build vs. Tolerate",
        subtitle: "Separate 'want to master' from 'can do but dislike'. This shapes fit quality significantly."
      },
      {
        title: "Company Type & Region",
        subtitle: "Startup / SME / corporate, product / service, known brand / hidden champion. Country/region preference or hard constraint."
      },
      {
        title: "Hard Constraints",
        subtitle: "Minimum salary, remote %, location, start date, visa/permit status, language of work."
      },
      {
        title: "Work Style",
        subtitle: "Solo deep-focus vs. collaborative, how you handle ambiguity, preferred feedback culture, pace."
      },
      {
        title: "What Should the LLM Know That's Not in the CV?",
        subtitle: "Personality, values, things that went wrong before, what a great day at work looks like. Free-form."
      }
    ];

    let currentQuestion = 0;
    let answers = [];

    async function init() {
      try {
        showQuestion(0);
      } catch (e) {
        document.getElementById('question-title').textContent = 'Error loading questions';
        console.error(e);
      }
    }

    function showQuestion(index) {
      currentQuestion = index;
      const q = questions[index];
      document.getElementById('question-counter').textContent = `Question ${index + 1} of ${questions.length}`;
      document.getElementById('question-title').textContent = q.title;
      document.getElementById('question-subtitle').textContent = q.subtitle;
      document.getElementById('answer-input').value = answers[index] || '';
      document.getElementById('prev-btn').style.display = index > 0 ? 'block' : 'none';
      document.getElementById('next-btn').textContent = index === questions.length - 1 ? 'Complete' : 'Next';
      document.getElementById('progress-fill').style.width = `${((index + 1) / questions.length) * 100}%`;
    }

    async function nextQuestion() {
      const answer = document.getElementById('answer-input').value.trim();
      if (!answer) {
        alert('Please provide an answer');
        return;
      }
      
      answers[currentQuestion] = answer;
      
      // Check if we're on the last question (10th)
      if (currentQuestion === questions.length - 1) {
        // All questions answered, call complete endpoint with all answers
        await completeOnboarding();
      } else {
        showQuestion(currentQuestion + 1);
      }
    }
    
    async function completeOnboarding() {
      document.getElementById('question-container').style.display = 'none';
      document.getElementById('loading-screen').style.display = 'block';
      
      // Call complete endpoint to generate markdown profile
      try {
        const res = await fetch('/api/onboarding/complete', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({answers: answers})
        });
        const data = await res.json();
        
        if (data.ok) {
          document.getElementById('loading-screen').style.display = 'none';
          document.getElementById('complete-screen').style.display = 'block';
        } else {
          document.getElementById('loading-screen').style.display = 'none';
          document.getElementById('question-container').style.display = 'block';
          alert('Profile generation failed: ' + (data.error || 'Unknown error'));
        }
      } catch (e) {
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('question-container').style.display = 'block';
        console.error('Complete error:', e);
        alert('Error generating profile: ' + e.message);
      }
    }

    function prevQuestion() {
      if (currentQuestion > 0) {
        answers[currentQuestion] = document.getElementById('answer-input').value;
        showQuestion(currentQuestion - 1);
      }
    }

    function goToDashboard() {
      window.location.href = '/';
    }

    init();
  </script>
</body>
</html>
