<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Radar - Onboarding</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 20px;
    }
    .onboarding-container {
      width: 100%;
      max-width: 800px;
      padding: 40px;
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    .progress-bar {
      height: 6px;
      background: var(--border2);
      border-radius: 3px;
      margin-bottom: 40px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      transition: width 0.3s ease;
    }
    .question-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text);
      line-height: 1.3;
    }
    .question-subtitle {
      font-size: 15px;
      color: var(--text2);
      margin-bottom: 24px;
      line-height: 1.6;
    }
    textarea {
      width: 100%;
      min-height: 200px;
      padding: 16px;
      border: 1px solid var(--border2);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      resize: vertical;
      font-family: inherit;
    }
    textarea::placeholder {
      color: var(--text3);
      opacity: 0.6;
    }
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim);
    }
    .button-row {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      justify-content: flex-end;
    }
    button {
      padding: 12px 24px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover {
      background: #4a9af0;
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border2);
    }
    .btn-secondary:hover {
      background: var(--surface3);
      border-color: var(--border);
    }
    .complete-screen {
      text-align: center;
      display: none;
      padding: 40px 20px;
    }
    .complete-screen h2 {
      font-size: 32px;
      margin-bottom: 16px;
      color: var(--green);
    }
    .complete-screen p {
      color: var(--text2);
      margin-bottom: 32px;
      font-size: 16px;
      line-height: 1.6;
    }
    /* Question counter badge */
    .question-counter {
      display: inline-block;
      padding: 4px 12px;
      background: var(--accent-dim);
      color: var(--accent);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="onboarding-container">
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
    </div>
    
    <div id="question-container">
      <div class="question-counter" id="question-counter">Question 1 of 9</div>
      <h1 class="question-title" id="question-title">Loading...</h1>
      <p class="question-subtitle" id="question-subtitle"></p>
      <textarea id="answer-input" placeholder="Type your answer here..."></textarea>
      <div class="button-row">
        <button class="btn-secondary" id="prev-btn" onclick="prevQuestion()" style="display:none">Previous</button>
        <button class="btn-primary" id="next-btn" onclick="nextQuestion()">Next</button>
      </div>
    </div>
    
    <div class="complete-screen" id="complete-screen">
      <h2>✅ Profile Complete!</h2>
      <p>Your profile has been created. The AI will now use this to evaluate job fit.</p>
      <button class="btn-primary" onclick="goToDashboard()">Go to Dashboard</button>
    </div>
  </div>

  <script>
    const questions = [
      {
        title: "Tell me about your background",
        subtitle: "Paste your CV or describe your experience. Focus on what you actually did, not what looks impressive."
      },
      {
        title: "Describe a project you genuinely enjoyed",
        subtitle: "Not the one that looks best on paper — the one you looked forward to working on. What specifically made it engaging day-to-day?"
      },
      {
        title: "What made you leave your last role?",
        subtitle: "Think of a job or role you left (or considered leaving). What was the actual trigger — the moment you decided to start looking?"
      },
      {
        title: "A trade-off you accepted",
        subtitle: "Tell me about a time you accepted a job that had something you dislike (long commute, boring tech, big company) because something else made it worth it. What was that 'something else'?"
      },
      {
        title: "Your priorities",
        subtitle: "Rank these for your next role: (1) Technical challenge (2) Team quality (3) Compensation (4) Work-life balance (5) Product domain. What would make you sacrifice #1 for #3?"
      },
      {
        title: "What pulls your attention?",
        subtitle: "What technologies, domains, or problems have you found yourself reading about or tinkering with in your free time? Not work-related — just what pulls your attention."
      },
      {
        title: "Your deal-breakers",
        subtitle: "Give me 2-3 things that would make you immediately reject a role. For each: is there ANY scenario where you'd accept it anyway? What would that scenario be?"
      },
      {
        title: "Your ideal Monday",
        subtitle: "It's Monday 9am. You're in the right job. What are you looking forward to this week?"
      },
      {
        title: "External perspective",
        subtitle: "What would your last manager or teammate say you should look for in a role that you might not have mentioned?"
      }
    ];

    let currentQuestion = 0;
    let sessionId = null;
    let answers = [];

    async function init() {
      try {
        const res = await fetch('/api/onboarding/start', {method: 'POST'});
        const data = await res.json();
        sessionId = data.session_id;
        showQuestion(0);
      } catch (e) {
        document.getElementById('question-title').textContent = 'Error starting onboarding';
        console.error(e);
      }
    }

    function showQuestion(index) {
      currentQuestion = index;
      const q = questions[index];
      document.getElementById('question-counter').textContent = `Question ${index + 1} of ${questions.length}`;
      document.getElementById('question-title').textContent = q.title;
      document.getElementById('question-subtitle').textContent = q.subtitle;
      document.getElementById('answer-input').value = answers[index] || '';
      document.getElementById('prev-btn').style.display = index > 0 ? 'block' : 'none';
      document.getElementById('next-btn').textContent = index === questions.length - 1 ? 'Complete' : 'Next';
      document.getElementById('progress-fill').style.width = `${((index + 1) / questions.length) * 100}%`;
    }

    async function nextQuestion() {
      const answer = document.getElementById('answer-input').value.trim();
      if (!answer) {
        alert('Please provide an answer');
        return;
      }
      
      answers[currentQuestion] = answer;
      
      try {
        const res = await fetch('/api/onboarding/answer', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({session_id: sessionId, answer: answer})
        });
        const data = await res.json();
        
        if (data.complete) {
          document.getElementById('question-container').style.display = 'none';
          document.getElementById('complete-screen').style.display = 'block';
        } else {
          showQuestion(currentQuestion + 1);
        }
      } catch (e) {
        console.error('Error submitting answer:', e);
        alert('Error saving answer. Please try again.');
      }
    }

    function prevQuestion() {
      if (currentQuestion > 0) {
        answers[currentQuestion] = document.getElementById('answer-input').value;
        showQuestion(currentQuestion - 1);
      }
    }

    function goToDashboard() {
      window.location.href = '/';
    }

    document.getElementById('answer-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.ctrlKey) {
        nextQuestion();
      }
    });

    init();
  </script>
</body>
</html>
